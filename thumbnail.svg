  <text x="60" y="570" font-family="Arial" font-size="12" fill="#F5E6C8">Q1: Apr 15 — $539</text>
  <text x="60" y="595" font-family="Arial" font-size="12" fill="#F5E6C8">Q2: Jun 15 — $539</text>
